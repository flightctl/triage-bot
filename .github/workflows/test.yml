name: "Unit Tests"

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@ed68ef82c095e0d48ec87eccea555d944a631a4c # v46
        with:
          files_ignore: |
            docs/**
            .github/**
            *.md
            LICENSE
            chart/**
            deploy/**

      - name: Set up Go
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download dependencies
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        run: go mod download

      - name: Run tests with race detector
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        run: make unit-test

      - name: Build
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        run: go build -o /dev/null .
