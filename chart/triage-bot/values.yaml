# -- Number of replicas. Must be 1 (stateless but single-writer to avoid duplicate comments).
replicaCount: 1

image:
  # -- Container image repository
  repository: quay.io/your-org/triage-bot
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to Chart appVersion)
  tag: ""

# -- Image pull secrets for private registries
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount for the pod
  create: true
  # -- Annotations for the ServiceAccount
  annotations: {}
  # -- Name override (default: release fullname)
  name: ""

# -- Pod resource requests and limits
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

# -- Pod-level security context (OCP restricted SCC compatible)
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

# -- Graceful shutdown period
terminationGracePeriodSeconds: 120

route:
  # -- Create an OCP Route for Jira webhook delivery.
  #    Requires webhookConfigured: true to confirm a webhook secret
  #    exists in the Jira Secret (key: webhook-secret).
  enabled: true
  # -- Set to true when the Jira Secret contains a webhook-secret key
  webhookConfigured: false
  # -- Hostname override (default: auto-generated by OCP)
  host: ""
  # -- Route annotations
  annotations: {}

nodeSelector: {}
tolerations: []
affinity: {}

# -- Extra environment variables for the pod
extraEnv: []

# ===========================================================
# Secrets
# ===========================================================

secrets:
  # -- Create Kubernetes Secrets from values below.
  create: true
  # -- Pre-created Secret containing Jira API token (key: jira-api-token)
  existingJiraSecret: ""
  # -- Pre-created Secret with Vertex AI GCP SA key (key: gcp-sa-key.json)
  existingVertexSecret: ""

  # Values below are used when secrets.create is true.
  # -- Jira API token (required)
  jiraApiToken: ""
  # -- Claude API key (for direct API mode; leave empty for Vertex AI)
  claudeApiKey: ""
  # -- Vertex AI GCP service account key JSON (optional)
  vertexSaKey: ""
  # -- Webhook HMAC secret (must match what's configured in Jira)
  webhookSecret: ""

# ===========================================================
# Application configuration
# ===========================================================

config:
  # -- Log triage results instead of writing to Jira
  dry_run: false

  server:
    port: 8080

  logging:
    level: info
    format: json

  jira:
    base_url: ""
    site_name: "redhat"             # Atlassian Cloud subdomain (e.g., "redhat" for redhat.atlassian.net)
    username: ""
    interval_seconds: 300
    project_keys: []
    max_results: 100
    # -- Component names to exclude from the triage scan JQL
    excluded_components: []

  ai:
    provider: claude
    model: "claude-sonnet-4-6"
    max_concurrent: 3
    timeout_minutes: 15
    allowed_tools: ""

    claude:
      vertex_project_id: ""
      vertex_region: ""

    gemini: {}

  triage:
    workflow_path: /opt/workflows/triage
    auto_fix_label: "ai-autofix-candidate"
    auto_fix_threshold: 80
    # -- Label applied when triage assessment is NEEDS_INFO (set to "" to disable)
    missing_info_label: "triage-missing-info"
    # -- Label applied when assessment is not AUTO_FIX or below threshold (set to "" to disable)
    not_fixable_label: "triage-not-fixable"
    # -- Label applied to closed issues that had autofix but no progression (set to "" to disable)
    stale_label: ""
    # -- Autofix progression labels to exclude from stale detection (e.g., merged, review, rejected)
    progression_labels: []
    # -- Path to a custom task template file (overrides built-in task.tmpl)
    task_template_path: ""
    # -- Inline task template (overrides task_template_path). Go template
    #    with variables: {{.IssueKey}}, {{.IssueURL}}, {{.OutputPath}},
    #    {{.MetadataPath}}, {{.WorkflowPath}}, {{.ProjectKey}},
    #    {{.SourcePath}} (empty when source repos not configured)
    task_template: ""
    # -- Import a workflow repo at startup (optional)
    import:
      # -- Git repo URL (leave empty to skip import)
      repo: ""
      # -- Subdirectory within the repo to extract
      path: ""
      # -- Branch, tag, or commit to checkout
      ref: "main"
      # -- Local destination (defaults to triage.workflow_path)
      dest: ""

  # -- Source repo configuration for source-level triage assessments (optional).
  #    When configured, the bot clones project repos and uses bugfix:assess
  #    (source-aware) instead of triage:assess (Jira-only). Omit entirely
  #    or leave projects empty to use Jira-only mode.
  source:
    # -- Base directory for shared repo clones
    base_dir: /var/lib/triage-bot/repos
    # -- Per-project source repo mappings. Keys are Jira project keys.
    #    Single-repo example:
    #      PROJ:
    #        repos:
    #          - url: https://github.com/org/proj.git
    #            ref: main
    #    Multi-repo example:
    #      MULTI:
    #        root_repo: https://github.com/org/workspace.git
    #        root_repo_ref: main
    #        repos:
    #          - name: backend
    #            url: https://github.com/org/backend.git
    #            ref: main
    #          - name: frontend
    #            url: https://github.com/org/frontend.git
    #            ref: main
    projects: {}

  mcp:
    jira:
      command: "npx"
      args: ["-y", "@aashari/mcp-server-atlassian-jira"]
      # env vars auto-populated from jira.site_name, jira.username,
      # jira.api_token. Override here if MCP needs different creds.
      env: {}
