{{- if .Values.secrets.create }}
{{- if not .Values.secrets.jiraApiToken }}
{{- fail "secrets.jiraApiToken is required when secrets.create is true" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "triage-bot.fullname" . }}-api-tokens
  labels:
    {{- include "triage-bot.labels" . | nindent 4 }}
type: Opaque
data:
  jira-api-token: {{ .Values.secrets.jiraApiToken | b64enc | quote }}
  {{- if .Values.secrets.claudeApiKey }}
  claude-api-key: {{ .Values.secrets.claudeApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.webhookSecret }}
  webhook-secret: {{ .Values.secrets.webhookSecret | b64enc | quote }}
  {{- end }}
---
{{- if .Values.secrets.vertexSaKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "triage-bot.fullname" . }}-vertex
  labels:
    {{- include "triage-bot.labels" . | nindent 4 }}
type: Opaque
data:
  gcp-sa-key.json: {{ .Values.secrets.vertexSaKey | b64enc | quote }}
{{- end }}
{{- end }}
